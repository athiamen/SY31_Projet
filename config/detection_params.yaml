detection_node:
  ros__parameters:

    # ── Topics ──────────────────────────────────────────────────────────────
    topic_image:     "/turtlecam/image_raw/compressed"
    topic_scan:      "/scan"
    topic_sensor:    "/sensor_state"

    # ── LiDAR ───────────────────────────────────────────────────────────────
    lidar:
      # Secteur frontal analysé (degrés, 0 = devant le robot)
      front_angle_deg: 30.0
      # Distance max pour considérer un objet présent
      max_detection_dist_m: 2.5
      # Distance max considérée valide (filtre inf/nan)
      range_max_valid_m: 3.4
      # Seuil cluster : saut de distance entre deux rayons consécutifs
      cluster_gap_m: 0.15
      # Seuil de largeur (m) pour distinguer petit / grand objet à 0.5m
      size_threshold_large_m: 0.30
      # Seuil intensité réfléchissante (normalisé 0–1)
      reflective_intensity_threshold: 0.6

    # ── Ultrason (SensorState.sonar) ─────────────────────────────────────────
    sonar:
      # Valeur brute maxi pour "objet détecté"
      detection_threshold_raw: 3000
      # Seuils bruts pour grande / petite distance
      close_threshold_raw: 1500
      far_threshold_raw:   4500

    # ── Caméra / couleur ────────────────────────────────────────────────────
    color:
      # Seuils HSV rouge  (deux plages car rouge est en bordure de H)
      red_h_lo1: 0;   red_h_hi1: 10
      red_h_lo2: 170; red_h_hi2: 180
      red_s_min: 80;  red_v_min: 60

      # Seuils HSV bleu
      blue_h_lo: 100; blue_h_hi: 130
      blue_s_min: 80; blue_v_min: 60

      # Seuils HSV réfléchissant (faible saturation, haute valeur)
      refl_s_max: 40;  refl_v_min: 180

      # Pourcentage minimal de pixels colorés pour valider la couleur
      min_color_ratio: 0.03

    # ── Forme (détection cercle/rectangle via Hough) ────────────────────────
    shape:
      canny_low:  50
      canny_high: 150
      hough_dp:   1.2
      hough_min_dist: 50
      hough_param1:   80
      hough_param2:   30
      hough_min_r:    20
      hough_max_r:    120
      # Ratio w/h pour panneau rectangulaire
      rect_aspect_min: 1.3
      rect_aspect_max: 4.0
      # Surface minimale contour pour être un panneau (px²)
      min_contour_area: 1000

    # ── Fusion ──────────────────────────────────────────────────────────────
    fusion:
      # Nombre de frames consécutives pour confirmer une détection
      confirmation_frames: 3
      # Pondération couleur / lidar / sonar pour le score final
      weight_color: 0.45
      weight_lidar: 0.35
      weight_sonar: 0.20
